[Service]
# ===== GREENER v1 (21-07-2026) — 2L/2S book. Reversible: rm this + daemon-reload + restart =====
# slots: 4 total = S1 fade(1) + S2 squeeze(1) + L1 snap(1) + L2 dip(1); sizing = equity/4 x 3x
Environment=TOTAL_SLOTS=4
Environment=S_FADE_CAP=1
Environment=SQF_ENABLED=1
Environment=SQF_CAP=1
Environment=SNAP_ENABLED=1
Environment=SNAP_CAP=1
Environment=M_DIP_CAP=1
Environment=M_TOTAL_LONG_CAP=2
# S1 FADE = WR70-study candidate #1: liq-at-fill >= $1k + TP0.5% / SL1.5%
Environment=GR_FILL_LIQ_MIN=1000
Environment=S_TP_FIXED=0.005
Environment=S_SL_FIXED=0.015
Environment=S_COIN7D_MIN=0
Environment=S_COIN7D_CAP=50
Environment=S_PUMP_MAX=2.5
Environment=S_SCAN_TFS=1h,15m
Environment=S_LIQ_MIN=0
Environment=S_RISK_FRAC=0.015
# E5 TRAIL (22-07, tuned on the 12 real night paths): arm on first +0.3% green; width 0.3% first 10min (instant-spike catcher), 0.75% after
Environment=SQF_TRAIL_ACT=0.003
Environment=SQF_TRAIL=0.0075
Environment=SQF_TRAIL_EARLY=0.003
Environment=SQF_TRAIL_EARLY_MIN=10
# short-side protections (fade + squeeze share the counters)
Environment=S_LOSS_STREAK_N=3
Environment=S_STREAK_COOLDOWN_SEC=3600
Environment=S_COIN_COOLDOWN_SEC=7200
Environment=S_BOOK_BREAKER_N=2
Environment=S_BOOK_WINDOW_SEC=2700
Environment=S_BOOK_COOLDOWN_SEC=3600
Environment=S_BOOK_BE_TIGHTEN=1
# dip leg (ballast, tight trail)
Environment=L_TRAIL_ACT=0.0075
Environment=L_TRAIL=0.003
